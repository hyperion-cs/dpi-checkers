name: dpi-ch release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.1.0)
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

env:
  APP_NAME: dpich
  GO_MODULE_DIR: ru/dpi-ch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe

          - goos: darwin
            goarch: amd64
            ext: ""

          - goos: darwin
            goarch: arm64
            ext: ""

          - goos: linux
            goarch: amd64
            ext: ""

          - goos: linux
            goarch: arm64
            ext: ""

    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ru/dpi-ch/go.mod
          cache-dependency-path: ru/dpi-ch/go.sum

      - name: Validate version
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

      - name: Build binary
        run: |
          set -euo pipefail

          mkdir -p dist

          binary_name="${APP_NAME}${{ matrix.ext }}"
          archive_name="${APP_NAME}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"

          (
            cd "${GO_MODULE_DIR}"

            CGO_ENABLED=0 \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            go build \
              -trimpath \
              -ldflags="-s -w -X github.com/hyperion-cs/dpi-checkers/ru/dpi-ch/internal/version.Value=${VERSION}" \
              -o "../../dist/${binary_name}" \
              .
          )

          (
            cd dist
            zip -9 -j "../${archive_name}" "${binary_name}"
          )

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t files < <(find artifacts -type f -name '*.zip' | sort)

          gh release create "dpich-${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "dpi-ch ${VERSION}" \
            --generate-notes \
            "${files[@]}"